<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Scan</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100dvh; display:flex; flex-direction:column; align-items:center; gap:16px; background:#0f0f0f; color:#f0f0f0; font-family:system-ui,sans-serif; padding:20px 20px 40px; }
    header { width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between; }
    h1 { font-size:1.4rem; font-weight:700; }
    a { color:#888; font-size:0.85rem; text-decoration:none; }
    .camera-wrapper { position:relative; width:100%; max-width:480px; border-radius:16px; overflow:hidden; background:#1a1a1a; aspect-ratio:4/3; }
    #video { width:100%; height:100%; object-fit:cover; display:block; }
    #canvas { display:none; }
    #preview { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
    .controls { display:flex; gap:10px; width:100%; max-width:480px; }
    button { flex:1; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
    button:active { transform:scale(0.97); }
    button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    #scanBtn { background:#fff; color:#000; }
    #retakeBtn { background:#2a2a2a; color:#fff; display:none; }
    .spinner { display:none; width:28px; height:28px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg { font-size:0.9rem; text-align:center; display:none; max-width:480px; }
    .msg.error { color:#ff6b6b; } .msg.info { color:#888; }
    .review-panel { display:none; width:100%; max-width:480px; background:#1a1a1a; border-radius:16px; padding:16px; flex-direction:column; gap:10px; }
    .review-panel.visible { display:flex; }
    .review-title { font-size:0.9rem; font-weight:600; color:#aaa; }
    .tile-row { display:flex; gap:8px; align-items:center; }
    .tile-row input { width:52px; padding:8px; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:1rem; text-align:center; }
    .tile-row .sep { color:#555; font-size:1.1rem; }
    .tile-row .total { color:#666; font-size:0.9rem; flex:1; }
    .tile-row .del { flex:none; width:28px; height:28px; padding:0; border-radius:6px; background:#2a2a2a; color:#666; font-size:0.8rem; }
    .review-total { font-size:0.85rem; color:#888; text-align:right; }
    .btn-confirm { background:#7c3aed; color:#fff; font-weight:700; padding:14px; border-radius:12px; border:none; width:100%; font-size:1rem; cursor:pointer; }
    .btn-confirm:active { transform:scale(0.97); }
    .total-bar { width:100%; max-width:480px; background:#1a1a1a; border-radius:16px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
    .total-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#666; }
    .total-value { font-size:2.4rem; font-weight:800; }
    .history { width:100%; max-width:480px; display:flex; flex-direction:column; gap:6px; padding-bottom:24px; }
    .history-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#444; margin-bottom:2px; }
    .history-item { display:flex; justify-content:space-between; align-items:center; background:#1a1a1a; border-radius:10px; padding:10px 14px; font-size:0.95rem; }
    .history-item span { color:#aaa; }
    .history-item button { flex:none; width:28px; height:28px; padding:0; border-radius:6px; background:#2a2a2a; color:#666; font-size:0.8rem; }
    .empty { color:#444; font-size:0.85rem; text-align:center; padding:8px 0; }
    .reset-btn { background:#1a1a1a; color:#555; font-size:0.85rem; padding:10px; border-radius:10px; border:none; cursor:pointer; width:100%; max-width:480px; }
  </style>
  <!-- OpenCV.js must be defined before the script loads -->
  <script>var Module={onRuntimeInitialized:function(){window._cvReady=true;var b=document.getElementById('scanBtn');if(b&&window._streamReady){b.disabled=false;b.textContent='Scan Tiles';}}};</script>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
</head>
<body>
  <header>
    <h1>Quick Scan</h1>
    <a href="index.html">← Home</a>
  </header>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="" />
  </div>
  <div class="controls">
    <button id="scanBtn" disabled>Loading CV…</button>
    <button id="retakeBtn">Retake</button>
  </div>
  <div class="spinner" id="spinner"></div>
  <p class="msg error" id="error"></p>
  <p class="msg info" id="info"></p>

  <div class="review-panel" id="reviewPanel">
    <div class="review-title">Review — correct any errors before adding</div>
    <div id="tileRows"></div>
    <div class="review-total" id="reviewTotal"></div>
    <button class="btn-confirm" onclick="confirmAll()">Add All to Total</button>
  </div>

  <div class="total-bar">
    <span class="total-label">Running Total</span>
    <span class="total-value" id="runningTotal">0</span>
  </div>
  <div class="history">
    <div class="history-label">Scanned tiles</div>
    <div id="historyList"><p class="empty">No tiles yet</p></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset</button>

  <script>
    const _c1="c2stYW50LWFwaTAzLWtIT0xRcDFLUjhkRGsz",_c2="Vkd5R2dnc1VLckh2Q0RzaVNOaS1pUEhwS21a",_c3="a1lXZjFzY0EzMS1iRGlDOTVrNEJER0c5eEVz",_c4="c28tclhORlN0VkFLRnFST0VnLTEzSHZ1d0FB";
    const _ak=atob(_c1+_c2+_c3+_c4);

    let tiles=[], pendingTiles=[];
    const video=document.getElementById("video"),canvas=document.getElementById("canvas"),preview=document.getElementById("preview");
    const scanBtn=document.getElementById("scanBtn"),retakeBtn=document.getElementById("retakeBtn");
    const spinner=document.getElementById("spinner"),errorEl=document.getElementById("error"),infoEl=document.getElementById("info");
    const reviewPanel=document.getElementById("reviewPanel"),tileRows=document.getElementById("tileRows"),reviewTotal=document.getElementById("reviewTotal");

    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:960}},audio:false})
      .then(s=>{
        video.srcObject=s;
        window._streamReady=true;
        if(window._cvReady){scanBtn.disabled=false;scanBtn.textContent='Scan Tiles';}
      }).catch(()=>showError("Camera access denied."));

    // ── OpenCV pipeline ────────────────────────────────────────────────────────
    function countDots(halfMat) {
      const gray=new cv.Mat(), bin=new cv.Mat();
      const contours=new cv.MatVector(), hier=new cv.Mat();
      try {
        cv.cvtColor(halfMat, gray, cv.COLOR_RGBA2GRAY);
        // OTSU automatically picks the right threshold — dots dark, background bright
        cv.threshold(gray, bin, 0, 255, cv.THRESH_BINARY_INV+cv.THRESH_OTSU);
        // Open to remove noise specks
        const k=cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(3,3));
        cv.morphologyEx(bin, bin, cv.MORPH_OPEN, k); k.delete();
        cv.findContours(bin, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        const area=halfMat.rows*halfMat.cols;
        const minA=area*0.003, maxA=area*0.18;
        let n=0;
        for(let i=0;i<contours.size();i++){
          const c=contours.get(i), ca=cv.contourArea(c);
          if(ca>=minA&&ca<=maxA) n++;
          c.delete();
        }
        return n;
      } finally { gray.delete();bin.delete();contours.delete();hier.delete(); }
    }

    function detectAndCount(canvas) {
      const src=cv.imread(canvas);
      const gray=new cv.Mat(), thresh=new cv.Mat();
      const contours=new cv.MatVector(), hier=new cv.Mat();
      const results=[];
      try {
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        // White tiles on dark background — simple binary threshold
        cv.threshold(gray, thresh, 160, 255, cv.THRESH_BINARY);
        // Close to fill tile interiors (dots create holes)
        const k=cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(11,11));
        cv.morphologyEx(thresh, thresh, cv.MORPH_CLOSE, k); k.delete();
        cv.findContours(thresh, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        const imgArea=src.rows*src.cols;
        for(let i=0;i<contours.size();i++){
          const cnt=contours.get(i);
          const area=cv.contourArea(cnt);
          cnt.delete();
          // Must be meaningful size — at least 0.5% of image, not huge
          if(area<imgArea*0.005||area>imgArea*0.9) continue;

          // Get bounding rect and check domino aspect ratio
          const rect=cv.boundingRect(contours.get(i));
          contours.get(i).delete();
          const ar=rect.width/rect.height;
          const landscape=ar>=1.2&&ar<=3.2;
          const portrait=ar<=0.83&&ar>=0.31;
          if(!landscape&&!portrait) continue;

          // Trim a few pixels of tile border before counting
          const pad=Math.max(3,Math.round(Math.min(rect.width,rect.height)*0.04));
          const rx=rect.x+pad, ry=rect.y+pad;
          const rw=rect.width-2*pad, rh=rect.height-2*pad;
          if(rw<20||rh<20) continue;

          const roi=new cv.Rect(rx,ry,rw,rh);
          const tile=src.roi(roi);

          let lCount, rCount;
          if(landscape){
            const hw=Math.floor(rw/2);
            const lh=tile.roi(new cv.Rect(0,0,hw,rh));
            const rh2=tile.roi(new cv.Rect(hw,0,rw-hw,rh));
            lCount=countDots(lh); rCount=countDots(rh2);
            lh.delete(); rh2.delete();
          } else {
            const hh=Math.floor(rh/2);
            const th=tile.roi(new cv.Rect(0,0,rw,hh));
            const bh=tile.roi(new cv.Rect(0,hh,rw,rh-hh));
            lCount=countDots(th); rCount=countDots(bh);
            th.delete(); bh.delete();
          }
          tile.delete();
          results.push({left:lCount,right:rCount});
        }
      } finally { src.delete();gray.delete();thresh.delete();contours.delete();hier.delete(); }
      return results;
    }

    // ── Claude fallback ────────────────────────────────────────────────────────
    async function callClaude(b64){
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":_ak,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-opus-4-8",max_tokens:4096,thinking:{type:"adaptive"},messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:"These are domino tiles from a double-12 set. Each half can show 0 to 12 dots. Count each half's dots row by row, verify by recounting, then reply ONLY with JSON: {\"tiles\":[{\"left\":<n>,\"right\":<n>},...]}"}
        ]}]})
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.error?.message||"API error");
      const text=data.content.find(b=>b.type==="text")?.text||"";
      const m=text.match(/\{[\s\S]*\}/);
      if(!m)return null;
      return (JSON.parse(m[0]).tiles||[]).map(t=>({left:Number(t.left)||0,right:Number(t.right)||0}));
    }

    // ── Scan button ────────────────────────────────────────────────────────────
    scanBtn.addEventListener("click",async()=>{
      if(!video.videoWidth){showError("Camera not ready.");return;}
      hideMsg();reviewPanel.classList.remove("visible");

      // Draw frame to canvas and apply saturation-darkening for display
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(video,0,0);

      // Show preview (processed B&W)
      const id=ctx.getImageData(0,0,canvas.width,canvas.height),px=id.data;
      for(let i=0;i<px.length;i+=4){
        const r=px[i],g=px[i+1],b=px[i+2];
        const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
        const sat=mx>0?(mx-mn)/mx:0;
        const lum=0.299*r+0.587*g+0.114*b;
        const v=Math.min(255,Math.max(0,lum-sat*210));
        px[i]=px[i+1]=px[i+2]=Math.round(v);
      }
      ctx.putImageData(id,0,0);
      preview.src=canvas.toDataURL("image/jpeg",0.92);
      preview.style.display="block";video.style.display="none";
      scanBtn.style.display="none";retakeBtn.style.display="block";
      spinner.style.display="block";scanBtn.disabled=true;

      try{
        // Try OpenCV first
        showInfo("Detecting tiles…");
        let found=detectAndCount(canvas);

        if(!found.length){
          // Fallback: ask Claude
          showInfo("No tiles detected — trying AI fallback…");
          const base64=preview.src.split(",")[1];
          const r1=await callClaude(base64);
          found=(r1||[]);
        }

        if(!found.length)throw new Error("No tiles found. Try better lighting or hold the camera closer.");
        pendingTiles=found.map(t=>({left:t.left,right:t.right}));
        renderReview();reviewPanel.classList.add("visible");
        hideMsg();
      }catch(err){showError(err.message);}
      finally{spinner.style.display="none";scanBtn.disabled=false;}
    });

    retakeBtn.addEventListener("click",()=>{
      preview.style.display="none";video.style.display="block";
      scanBtn.style.display="block";retakeBtn.style.display="none";
      reviewPanel.classList.remove("visible");hideMsg();
    });

    function renderReview(){
      tileRows.innerHTML=pendingTiles.map((t,i)=>`
        <div class="tile-row">
          <input type="number" min="0" max="12" value="${t.left}" onchange="upd(${i},'left',this.value)" />
          <span class="sep">|</span>
          <input type="number" min="0" max="12" value="${t.right}" onchange="upd(${i},'right',this.value)" />
          <span class="total">= ${t.left+t.right}</span>
          <button class="del" onclick="rmv(${i})">&#x2715;</button>
        </div>`).join("");
      const sum=pendingTiles.reduce((s,t)=>s+t.left+t.right,0);
      reviewTotal.textContent=`Total: ${sum} across ${pendingTiles.length} tile${pendingTiles.length!==1?'s':''}`;
    }

    function upd(i,side,val){pendingTiles[i][side]=parseInt(val)||0;renderReview();}
    function rmv(i){pendingTiles.splice(i,1);if(!pendingTiles.length){reviewPanel.classList.remove("visible");return;}renderReview();}

    function confirmAll(){
      if(!pendingTiles.length)return;
      tiles.push(...pendingTiles);pendingTiles=[];
      renderHistory();
      reviewPanel.classList.remove("visible");
      preview.style.display="none";video.style.display="block";
      scanBtn.style.display="block";retakeBtn.style.display="none";hideMsg();
    }

    function renderHistory(){
      const total=tiles.reduce((s,t)=>s+t.left+t.right,0);
      document.getElementById("runningTotal").textContent=total;
      if(!tiles.length){document.getElementById("historyList").innerHTML='<p class="empty">No tiles yet</p>';return;}
      document.getElementById("historyList").innerHTML=[...tiles].reverse().map((t,ri)=>{
        const i=tiles.length-1-ri;
        return `<div class="history-item"><strong>${t.left} | ${t.right}</strong><span>= ${t.left+t.right}</span><button onclick="removeItem(${i})">&#x2715;</button></div>`;
      }).join("");
    }

    function removeItem(i){tiles.splice(i,1);renderHistory();}
    function resetAll(){tiles=[];pendingTiles=[];renderHistory();reviewPanel.classList.remove("visible");}
    function showError(m){errorEl.textContent=m;errorEl.style.display="block";infoEl.style.display="none";}
    function showInfo(m){infoEl.textContent=m;infoEl.style.display="block";errorEl.style.display="none";}
    function hideMsg(){errorEl.style.display="none";infoEl.style.display="none";}
  </script>
</body>
</html>
