<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Scan</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100dvh; display:flex; flex-direction:column; align-items:center; gap:16px; background:#0f0f0f; color:#f0f0f0; font-family:system-ui,sans-serif; padding:20px 20px 40px; }
    header { width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between; }
    h1 { font-size:1.4rem; font-weight:700; }
    a { color:#888; font-size:0.85rem; text-decoration:none; }
    .camera-wrapper {
      position:relative; width:100%; max-width:480px; border-radius:16px;
      overflow:hidden; background:#1a1a1a; aspect-ratio:4/3;
      border:3px solid #333; transition:border-color 0.4s;
    }
    .camera-wrapper.warn { border-color:#f59e0b; }
    .camera-wrapper.good { border-color:#22c55e; }
    #video { width:100%; height:100%; object-fit:cover; display:block; }
    #canvas { display:none; }
    #preview { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
    .cam-guide {
      position:absolute; top:8%; left:8%; width:84%; height:84%;
      border:2px dashed #444; border-radius:10px; pointer-events:none;
      transition:border-color 0.4s, border-style 0.3s;
    }
    .camera-wrapper.warn .cam-guide { border-color:#f59e0b; border-style:solid; }
    .camera-wrapper.good .cam-guide { border-color:#22c55e; border-style:solid; }
    .cam-guide::before, .cam-guide::after {
      content:''; position:absolute; width:18px; height:18px; border-color:inherit;
    }
    .cam-guide::before { top:-1px; left:-1px; border-top:3px solid; border-left:3px solid; border-radius:4px 0 0 0; }
    .cam-guide::after  { bottom:-1px; right:-1px; border-bottom:3px solid; border-right:3px solid; border-radius:0 0 4px 0; }
    .guidance { font-size:0.85rem; text-align:center; min-height:1.3em; max-width:480px; color:#555; transition:color 0.3s; }
    .guidance.warn { color:#f59e0b; }
    .guidance.good { color:#22c55e; }
    .controls { display:flex; gap:10px; width:100%; max-width:480px; }
    button { flex:1; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
    button:active { transform:scale(0.97); }
    button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    #scanBtn { background:#fff; color:#000; }
    #retakeBtn { background:#2a2a2a; color:#fff; display:none; }
    .msg { font-size:0.9rem; text-align:center; display:none; max-width:480px; }
    .msg.error { color:#ff6b6b; } .msg.info { color:#888; }
    .review-panel { display:none; width:100%; max-width:480px; background:#1a1a1a; border-radius:16px; padding:16px; flex-direction:column; gap:10px; }
    .review-panel.visible { display:flex; }
    .review-title { font-size:0.9rem; font-weight:600; color:#aaa; }
    .tile-row { display:flex; gap:8px; align-items:center; }
    .tile-row input { width:52px; padding:8px; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:1rem; text-align:center; }
    .tile-row .sep { color:#555; font-size:1.1rem; }
    .tile-row .total { color:#666; font-size:0.9rem; }
    .tile-row .badge { font-size:0.7rem; font-weight:700; padding:2px 6px; border-radius:4px; white-space:nowrap; flex:1; }
    .badge.ok  { color:#4ade80; }
    .badge.unk { color:#f97316; }
    .tile-row .del { flex:none; width:28px; height:28px; padding:0; border-radius:6px; background:#2a2a2a; color:#666; font-size:0.8rem; }
    .tile-card { background:#111; border-radius:10px; overflow:hidden; display:flex; flex-direction:row; align-items:center; gap:8px; padding:4px 8px; }
    .tile-card img { height:56px; width:auto; object-fit:contain; flex:none; border-radius:4px; }
    .tile-card .tile-row { padding:4px 0; flex:1; }
    .review-total { font-size:0.85rem; color:#888; text-align:right; }
    .btn-confirm { background:#7c3aed; color:#fff; font-weight:700; padding:14px; border-radius:12px; border:none; width:100%; font-size:1rem; cursor:pointer; }
    .btn-confirm:active { transform:scale(0.97); }
    .total-bar { width:100%; max-width:480px; background:#1a1a1a; border-radius:16px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
    .total-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#666; }
    .total-value { font-size:2.4rem; font-weight:800; }
    .history { width:100%; max-width:480px; display:flex; flex-direction:column; gap:6px; padding-bottom:24px; }
    .history-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#444; margin-bottom:2px; }
    .history-item { display:flex; justify-content:space-between; align-items:center; background:#1a1a1a; border-radius:10px; padding:10px 14px; font-size:0.95rem; }
    .history-item span { color:#aaa; }
    .history-item button { flex:none; width:28px; height:28px; padding:0; border-radius:6px; background:#2a2a2a; color:#666; font-size:0.8rem; }
    .empty { color:#444; font-size:0.85rem; text-align:center; padding:8px 0; }
    .reset-btn { background:#1a1a1a; color:#555; font-size:0.85rem; padding:10px; border-radius:10px; border:none; cursor:pointer; width:100%; max-width:480px; }
  </style>
  <script>
    // Propagate the page's ?v= cache-buster to config.js and detect.js so a
    // fresh link actually reloads the detection module (not just this HTML).
    (function () {
      const v = new URLSearchParams(location.search).get("v");
      const q = v ? "?v=" + encodeURIComponent(v) : "";
      document.write('<script src="config.js' + q + '"><\/script>');
      document.write('<script src="detect.js' + q + '"><\/script>');
    })();
  </script>
</head>
<body>
  <header>
    <h1>Quick Scan</h1>
    <a href="index.html">&#8592; Home</a>
  </header>

  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="" />
    <div class="cam-guide" id="camGuide"></div>
  </div>

  <p class="guidance" id="guidance">Lay tiles flat &#183; good lighting</p>

  <div class="controls">
    <button id="scanBtn">Scan Tiles</button>
    <button id="loadBtn">Load Photo</button>
    <button id="retakeBtn">Retake</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <p class="msg error" id="error"></p>
  <p class="msg info"  id="info"></p>

  <div class="review-panel" id="reviewPanel">
    <div class="review-title">Review &#8212; correct any errors before adding</div>
    <div id="tileRows"></div>
    <div class="review-total" id="reviewTotal"></div>
    <button class="btn-confirm" onclick="confirmAll()">Add All to Total</button>
  </div>

  <div class="total-bar">
    <span class="total-label">Running Total</span>
    <span class="total-value" id="runningTotal">0</span>
  </div>
  <div class="history">
    <div class="history-label">Scanned tiles</div>
    <div id="historyList"><p class="empty">No tiles yet</p></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset</button>

  <script>
    const PROXY = window.PROXY_URL;
    const OWNER = "petr0n", REPO = "domino-counter-app";

    let catalog = { tiles: {} };
    let tiles = [], pendingTiles = [];
    let analysing = false, analysisTimer = null;
    let vcap = null;

    const video         = document.getElementById("video");
    const canvas        = document.getElementById("canvas");
    const preview       = document.getElementById("preview");
    const scanBtn       = document.getElementById("scanBtn");
    const loadBtn       = document.getElementById("loadBtn");
    const fileInput     = document.getElementById("fileInput");
    const retakeBtn     = document.getElementById("retakeBtn");
    const errorEl       = document.getElementById("error");
    const infoEl        = document.getElementById("info");
    const reviewPanel   = document.getElementById("reviewPanel");
    const tileRows      = document.getElementById("tileRows");
    const reviewTotal   = document.getElementById("reviewTotal");
    const cameraWrapper = document.getElementById("cameraWrapper");
    const guidanceEl    = document.getElementById("guidance");
    const camGuide      = document.getElementById("camGuide");

    // Load catalog in background for cross-reference
    fetch(`${PROXY}/github/repos/${OWNER}/${REPO}/contents/catalog.json`, {
      headers: { Accept: "application/vnd.github.v3+json" }
    }).then(r => r.ok ? r.json() : null)
      .then(j => { if (j) catalog = JSON.parse(atob(j.content.replace(/\n/g, ""))); })
      .catch(() => {});

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    }).then(s => { video.srcObject = s; })
      .catch(() => showError("Camera access denied."));

    // Detection (loadCV / preprocess / scanCanvas) lives in detect.js — the one
    // shared pipeline. After OpenCV loads, set up the guidance capture once.
    async function ensureCV() {
      await DominoCV.loadCV();
      if (!vcap) { vcap = new cv.VideoCapture(video); startAnalysis(); }
    }

    // ── Real-time frame guidance ─────────────────────────────────────────────
    // Checks brightness, sharpness, and estimates tile count in frame.

    function startAnalysis() {
      if (analysing) return;
      analysing = true;
      scheduleAnalysis();
    }

    function stopAnalysis() {
      analysing = false;
      if (analysisTimer) { clearTimeout(analysisTimer); analysisTimer = null; }
    }

    function scheduleAnalysis() {
      if (!analysing) return;
      analysisTimer = setTimeout(runAnalysis, 450);
    }

    function runAnalysis() {
      if (!analysing || !DominoCV.isReady() || !video.videoWidth) { scheduleAnalysis(); return; }

      let src = null, small = null, gray = null, lap = null, mM = null, sM = null;
      let binary = null, contours = null, hier = null, blurSmall = null;
      try {
        src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        vcap.read(src);

        small = new cv.Mat();
        cv.resize(src, small, new cv.Size(320, 240));

        gray = new cv.Mat();
        cv.cvtColor(small, gray, cv.COLOR_RGBA2GRAY);

        // Brightness
        mM = new cv.Mat(); sM = new cv.Mat();
        cv.meanStdDev(gray, mM, sM);
        const brightness = mM.data64F[0];
        mM.delete(); sM.delete(); mM = null; sM = null;

        // Sharpness
        lap = new cv.Mat();
        cv.Laplacian(gray, lap, cv.CV_8U);
        mM = new cv.Mat(); sM = new cv.Mat();
        cv.meanStdDev(lap, mM, sM);
        const sharpness = sM.data64F[0];
        mM.delete(); sM.delete(); mM = null; sM = null;

        // Quick tile-count estimate — isolated so a failure can't break the guidance loop
        let tileCount = 0;
        if (brightness >= 55 && brightness <= 215 && sharpness >= 4) {
          try {
            blurSmall = new cv.Mat();
            cv.GaussianBlur(gray, blurSmall, new cv.Size(5, 5), 0);
            binary = new cv.Mat();
            cv.Canny(blurSmall, binary, 20, 60);
            contours = new cv.MatVector();
            hier = new cv.Mat();
            cv.findContours(binary, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            const smallArea = 320 * 240;
            for (let i = 0; i < contours.size(); i++) {
              const c = contours.get(i);
              const a = cv.contourArea(c);
              c.delete();
              if (a > smallArea * 0.03 && a < smallArea * 0.60) tileCount++;
            }
            tileCount = Math.min(tileCount, 9);
          } catch (_) { tileCount = 0; }
        }

        let text, state;
        if (brightness < 55) {
          text = "Too dark — find better lighting"; state = "";
        } else if (brightness > 215) {
          text = "Too bright — reduce glare"; state = "";
        } else if (sharpness < 4) {
          text = "Hold steady — too blurry"; state = "";
        } else if (tileCount === 0) {
          text = "Point camera at tiles"; state = "";
        } else if (sharpness < 9) {
          text = `${tileCount} tile${tileCount !== 1 ? "s" : ""} detected — hold steadier`; state = "warn";
        } else {
          text = `${tileCount} tile${tileCount !== 1 ? "s" : ""} detected — tap Scan`; state = "good";
        }

        setGuidance(text, state);
      } catch (_) {
      } finally {
        if (src)      src.delete();
        if (small)    small.delete();
        if (gray)     gray.delete();
        if (lap)      lap.delete();
        if (mM)       mM.delete();
        if (sM)       sM.delete();
        if (binary)    binary.delete();
        if (contours)  contours.delete();
        if (hier)      hier.delete();
        if (blurSmall) blurSmall.delete();
      }
      scheduleAnalysis();
    }

    function setGuidance(text, state) {
      guidanceEl.textContent = text;
      guidanceEl.className = "guidance" + (state ? " " + state : "");
      cameraWrapper.className = "camera-wrapper" + (state ? " " + state : "");
    }

    // ── Shared scan logic ────────────────────────────────────────────────────
    async function doScan() {
      hideMsg();
      reviewPanel.classList.remove("visible");
      // Crop to the guide box region (8% margin each side) before detection
      (function cropToGuide() {
        const cw = canvas.width, ch = canvas.height;
        const x1 = Math.round(cw * 0.08), y1 = Math.round(ch * 0.08);
        const w  = Math.round(cw * 0.84), h  = Math.round(ch * 0.84);
        const d  = canvas.getContext("2d").getImageData(x1, y1, w, h);
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").putImageData(d, 0, 0);
      })();
      DominoCV.preprocess(canvas);

      const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
      preview.src = dataUrl;
      preview.style.display   = "block";
      video.style.display     = "none";
      camGuide.style.display  = "none";
      scanBtn.style.display   = "none";
      loadBtn.style.display   = "none";
      retakeBtn.style.display = "block";
      stopAnalysis();
      setGuidance("", "");
      scanBtn.disabled = true;
      loadBtn.disabled = true;

      try {
        showInfo("Detecting tiles…");
        await ensureCV();
        const found = DominoCV.scanCanvasDebug(canvas);
        fetch("http://localhost:8766/log", { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ tileCount: (found||[]).length, tiles: (found||[]).map(t=>({left:t.left,right:t.right})) })
        }).catch(()=>{});
        if (!found || !found.length) throw new Error("No tiles found. Make sure tiles are fully in frame and well-lit.");
        pendingTiles = found;
        renderReview();
        reviewPanel.classList.add("visible");
        hideMsg();
      } catch (err) {
        showError(err.message);
      } finally {
        scanBtn.disabled = false;
        loadBtn.disabled = false;
      }
    }

    // ── Scan button (camera) ─────────────────────────────────────────────────
    scanBtn.addEventListener("click", async () => {
      if (!video.videoWidth) { showError("Camera not ready."); return; }
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      await doScan();
    });

    // ── Load Photo button ────────────────────────────────────────────────────
    loadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileInput.value = "";
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = async () => {
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext("2d").drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        await ensureCV();
        await doScan();
      };
      img.onerror = () => { URL.revokeObjectURL(url); showError("Could not load image."); };
      img.src = url;
    });

    // ── Retake ───────────────────────────────────────────────────────────────
    retakeBtn.addEventListener("click", () => {
      preview.style.display   = "none";
      video.style.display     = "block";
      camGuide.style.display  = "block";
      scanBtn.style.display   = "block";
      loadBtn.style.display   = "block";
      retakeBtn.style.display = "none";
      reviewPanel.classList.remove("visible");
      hideMsg();
      startAnalysis();
    });

    // ── Review panel helpers ─────────────────────────────────────────────────
    function tileKey(l, r) { return `${Math.min(l, r)}-${Math.max(l, r)}`; }
    function inCatalog(l, r) { return !!catalog.tiles?.[tileKey(l, r)]; }

    function renderReview() {
      tileRows.innerHTML = pendingTiles.map((t, i) => {
        const ok    = inCatalog(t.left, t.right);
        const blur  = t.fill != null && t.fill < 0.75;
        const badge = blur
          ? `<span class="badge unk">? merged tiles?</span>`
          : ok
            ? `<span class="badge ok">&#x2713; catalog</span>`
            : `<span class="badge unk">? check</span>`;
        const img = t.dataUrl ? `<img src="${t.dataUrl}" alt="tile ${i+1}">` : "";
        return `<div class="tile-card">
          ${img}
          <div class="tile-row">
            <input type="number" min="0" max="12" value="${t.left}"  onchange="upd(${i},'left',this.value)" />
            <span class="sep">|</span>
            <input type="number" min="0" max="12" value="${t.right}" onchange="upd(${i},'right',this.value)" />
            <span class="total">= ${t.left + t.right}</span>
            ${badge}
            <button class="del" onclick="rmv(${i})">&#x2715;</button>
          </div>
        </div>`;
      }).join("");
      const sum = pendingTiles.reduce((s, t) => s + t.left + t.right, 0);
      reviewTotal.textContent = `Total: ${sum} across ${pendingTiles.length} tile${pendingTiles.length !== 1 ? "s" : ""}`;
    }

    function clampPip(v){return Math.min(12,Math.max(0,parseInt(v)||0));}
    function upd(i, side, val) { pendingTiles[i][side] = clampPip(val); renderReview(); }
    function rmv(i) { pendingTiles.splice(i, 1); if (!pendingTiles.length) { reviewPanel.classList.remove("visible"); return; } renderReview(); }

    function confirmAll() {
      if (!pendingTiles.length) return;
      if(pendingTiles.some(t=>t.left>12||t.right>12||t.left<0||t.right<0)){showError("Each side must be 0–12.");return;}
      tiles.push(...pendingTiles);
      pendingTiles = [];
      renderHistory();
      reviewPanel.classList.remove("visible");
      preview.style.display   = "none";
      video.style.display     = "block";
      camGuide.style.display  = "block";
      scanBtn.style.display   = "block";
      retakeBtn.style.display = "none";
      hideMsg();
      startAnalysis();
    }

    function renderHistory() {
      const total = tiles.reduce((s, t) => s + t.left + t.right, 0);
      document.getElementById("runningTotal").textContent = total;
      if (!tiles.length) {
        document.getElementById("historyList").innerHTML = '<p class="empty">No tiles yet</p>';
        return;
      }
      document.getElementById("historyList").innerHTML = [...tiles].reverse().map((t, ri) => {
        const i = tiles.length - 1 - ri;
        return `<div class="history-item"><strong>${t.left} | ${t.right}</strong><span>= ${t.left + t.right}</span><button onclick="removeItem(${i})">&#x2715;</button></div>`;
      }).join("");
    }

    function removeItem(i) { tiles.splice(i, 1); renderHistory(); }
    function resetAll() { tiles = []; pendingTiles = []; renderHistory(); reviewPanel.classList.remove("visible"); }

    function showError(m) { errorEl.textContent = m; errorEl.style.display = "block"; infoEl.style.display = "none"; }
    function showInfo(m)  { infoEl.textContent  = m; infoEl.style.display  = "block"; errorEl.style.display = "none"; }
    function hideMsg()    { errorEl.style.display = "none"; infoEl.style.display = "none"; }
  </script>
</body>
</html>
