<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Scanner</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100dvh; display:flex; flex-direction:column; align-items:center; gap:14px; background:#0f0f0f; color:#f0f0f0; font-family:system-ui,sans-serif; padding:20px 20px 40px; }
    header { width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between; }
    h1 { font-size:1.4rem; font-weight:700; }
    a { color:#888; font-size:0.85rem; text-decoration:none; }

    /* Setup card */
    .setup-card { width:100%; max-width:480px; background:#1a1a1a; border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .setup-card input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:1rem; }
    .setup-card input::placeholder { color:#555; }
    .row { display:flex; gap:8px; align-items:center; }
    .code-display { font-size:1.5rem; font-weight:800; letter-spacing:0.12em; color:#555; flex:1; }
    .code-display.active { color:#fff; }
    .btn-sm { padding:10px 16px; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-primary { background:#fff; color:#000; }
    .btn-blue    { background:#1d4ed8; color:#fff; }
    .btn-ghost   { background:#2a2a2a; color:#aaa; }

    /* Scoreboard */
    .scoreboard { width:100%; max-width:480px; background:#1a1a1a; border-radius:14px; padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
    .scoreboard-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#444; }
    .score-row { display:flex; justify-content:space-between; align-items:center; }
    .score-name { font-size:1rem; font-weight:600; }
    .score-name.me { color:#22c55e; }
    .score-val { font-size:1.6rem; font-weight:800; }
    .score-tiles { font-size:0.75rem; color:#555; }
    .no-scores { color:#444; font-size:0.85rem; text-align:center; padding:4px 0; }
    .my-tile-list { display:flex; flex-direction:column; gap:3px; margin-top:6px; }
    .my-tile-item { display:flex; justify-content:space-between; align-items:center; font-size:0.78rem; color:#666; }
    .my-tile-del { width:20px; height:20px; padding:0; border-radius:4px; background:#2a2a2a; color:#555; font-size:0.7rem; border:none; cursor:pointer; flex:none; }

    /* Camera */
    .camera-wrapper { position:relative; width:100%; max-width:480px; border-radius:16px; overflow:hidden; background:#1a1a1a; aspect-ratio:4/3; }
    #video { width:100%; height:100%; object-fit:cover; display:block; }
    #canvas { display:none; }
    #preview { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
    .controls { display:flex; gap:10px; width:100%; max-width:480px; }
    button { flex:1; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
    button:active { transform:scale(0.97); }
    button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    #scanBtn { background:#fff; color:#000; }
    #retakeBtn { background:#2a2a2a; color:#fff; display:none; }
    .spinner { display:none; width:28px; height:28px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg { font-size:0.9rem; text-align:center; display:none; max-width:480px; }
    .msg.error { color:#ff6b6b; } .msg.info { color:#888; }

    /* Review panel */
    .review-panel { display:none; width:100%; max-width:480px; background:#1a1a1a; border-radius:16px; padding:16px; flex-direction:column; gap:10px; }
    .review-panel.visible { display:flex; }
    .review-title { font-size:0.9rem; font-weight:600; color:#aaa; }
    .tile-row { display:flex; gap:8px; align-items:center; }
    .tile-row input { width:52px; padding:8px; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:1rem; text-align:center; }
    .tile-row .sep { color:#555; font-size:1.1rem; }
    .tile-row .total { color:#666; font-size:0.9rem; flex:1; }
    .tile-row .verified { color:#22c55e; font-size:0.75rem; }
    .tile-row .unverified { color:#f59e0b; font-size:0.75rem; }
    .tile-row.uncertain { background:#2a1f00; border-radius:8px; padding:2px 4px; }
    .tile-row .chk { color:#f59e0b; font-size:0.75rem; }
    .tile-row .del { flex:none; width:28px; height:28px; padding:0; border-radius:6px; background:#2a2a2a; color:#666; font-size:0.8rem; }
    .review-total { font-size:0.85rem; color:#888; text-align:right; }
    .btn-confirm { background:#22c55e; color:#000; font-weight:700; padding:14px; border-radius:12px; border:none; width:100%; font-size:1rem; cursor:pointer; }
    .btn-confirm:active { transform:scale(0.97); }
  </style>
</head>
<body>
  <header>
    <h1 id="pageTitle">Tile Scanner</h1>
    <a href="index.html">← Home</a>
  </header>

  <div class="setup-card" id="setupCard">
    <input id="nameInput" placeholder="Your name" />
    <!-- new game row -->
    <div id="newRow" class="row" style="display:none">
      <span id="codeDisplay" class="code-display">------</span>
      <button class="btn-sm btn-primary" onclick="newGame()">Start Game</button>
      <button class="btn-sm btn-ghost" onclick="loadSession()">Refresh</button>
    </div>
    <!-- join game row -->
    <div id="joinRow" class="row" style="display:none">
      <input id="joinInput" placeholder="Game code" maxlength="6" style="text-transform:uppercase;letter-spacing:0.1em" />
      <button class="btn-sm btn-blue" onclick="joinGame()">Join</button>
    </div>
  </div>

  <div class="scoreboard" id="scoreboard">
    <div class="scoreboard-title">Scoreboard</div>
    <div id="scoreRows"><p class="no-scores">Waiting for game…</p></div>
  </div>

  <div class="camera-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="" />
  </div>
  <div class="controls">
    <button id="scanBtn" disabled>Scan My Tiles</button>
    <button id="retakeBtn">Retake</button>
  </div>
  <div class="spinner" id="spinner"></div>
  <p class="msg error" id="error"></p>
  <p class="msg info" id="info"></p>

  <div class="review-panel" id="reviewPanel">
    <div class="review-title">Review — correct any errors before saving</div>
    <div id="tileRows"></div>
    <div class="review-total" id="reviewTotal"></div>
    <button class="btn-confirm" onclick="confirmAll()">Add All to My Score</button>
  </div>

  <script src="config.js"></script>
  <script>
    const PROXY=window.PROXY_URL;
    const OWNER="petr0n",REPO="domino-counter-app";
    const GH=`${PROXY}/github`;
    const GH_H={Accept:"application/vnd.github.v3+json","Content-Type":"application/json"};

    const mode=new URLSearchParams(location.search).get("mode")||"new";
    let gameCode=null,playerName="",tiles=[],catalog={tiles:{}},pendingTiles=[];

    // Set up UI for mode
    if(mode==="new"){
      document.getElementById("pageTitle").textContent="New Game";
      document.getElementById("newRow").style.display="flex";
    } else {
      document.getElementById("pageTitle").textContent="Join Game";
      document.getElementById("joinRow").style.display="flex";
    }

    const video=document.getElementById("video"),canvas=document.getElementById("canvas"),preview=document.getElementById("preview");
    const scanBtn=document.getElementById("scanBtn"),retakeBtn=document.getElementById("retakeBtn");
    const spinner=document.getElementById("spinner"),errorEl=document.getElementById("error"),infoEl=document.getElementById("info");
    const reviewPanel=document.getElementById("reviewPanel"),tileRows=document.getElementById("tileRows"),reviewTotal=document.getElementById("reviewTotal");

    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:960}},audio:false})
      .then(s=>video.srcObject=s).catch(()=>showError("Camera access denied."));

    fetch(`${GH}/repos/${OWNER}/${REPO}/contents/catalog.json`,{headers:GH_H})
      .then(r=>r.ok?r.json():null).then(j=>{if(j)catalog=JSON.parse(atob(j.content.replace(/\n/g,"")));});

    function tileKey(l,r){return `${Math.min(l,r)}-${Math.max(l,r)}`;}
    function isVerified(l,r){return !!catalog.tiles?.[tileKey(l,r)];}
    function genCode(){const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from(crypto.getRandomValues(new Uint8Array(6))).map(b=>a[b%a.length]).join('');}
    function getName(){const n=document.getElementById("nameInput").value.trim();if(!n)showError("Enter your name first.");return n;}

    async function newGame(){
      const name=getName();if(!name)return;
      playerName=name;showInfo("Creating game...");
      const code=genCode();
      const ok=await writeSession(code,[]);if(!ok)return;
      setGame(code,[]);
      const el=document.getElementById("codeDisplay");
      el.textContent=code;el.classList.add("active");
      showInfo("Share this code: "+code);
    }

    async function joinGame(){
      const name=getName();if(!name)return;
      const code=document.getElementById("joinInput").value.trim().toUpperCase();
      if(code.length!==6){showError("Enter a 6-letter code.");return;}
      playerName=name;showInfo("Joining...");
      const data=await readSession(code);if(data===null){showError("Game not found.");return;}
      setGame(code,data.tiles||[]);showInfo("Joined game "+code);
    }

    async function loadSession(){
      if(!gameCode){showError("Start a game first.");return;}
      showInfo("Refreshing...");
      const data=await readSession(gameCode);if(!data){showError("Could not load.");return;}
      tiles=data.tiles||[];renderScoreboard();
      showInfo("Updated!");setTimeout(()=>infoEl.style.display="none",1200);
    }

    function setGame(code,t){
      gameCode=code;tiles=t;
      scanBtn.disabled=false;renderScoreboard();
    }

    function renderScoreboard(){
      const scores={};
      tiles.forEach((t,i)=>{
        if(!scores[t.player])scores[t.player]={total:0,count:0,mine:[]};
        scores[t.player].total+=t.left+t.right;
        scores[t.player].count++;
        if(t.player===playerName)scores[t.player].mine.push({l:t.left,r:t.right,i});
      });
      const names=Object.keys(scores);
      if(!names.length){document.getElementById("scoreRows").innerHTML='<p class="no-scores">No tiles yet</p>';return;}
      names.sort((a,b)=>scores[b].total-scores[a].total);
      document.getElementById("scoreRows").innerHTML=names.map(n=>{
        const s=scores[n];
        const myTiles=n===playerName&&s.mine.length?`<div class="my-tile-list">${s.mine.map((t,mi)=>`<div class="my-tile-item"><span>${t.l}|${t.r} = ${t.l+t.r}</span><button class="my-tile-del" onclick="deleteSavedTile(${mi})">&#x2715;</button></div>`).join('')}</div>`:'';
        return `<div class="score-row"><div><div class="score-name${n===playerName?' me':''}">${n}${n===playerName?' (you)':''}</div><div class="score-tiles">${s.count} tile${s.count!==1?'s':''}</div>${myTiles}</div><span class="score-val">${s.total}</span></div>`;
      }).join("");
    }

    async function readSession(code){
      const res=await fetch(`${GH}/repos/${OWNER}/${REPO}/contents/sessions/${code}.json`,{headers:GH_H});
      if(res.status===404)return null;
      const j=await res.json();
      return JSON.parse(atob(j.content.replace(/\n/g,"")));
    }

    async function writeSession(code,t){
      const path=`sessions/${code}.json`;
      const url=`${GH}/repos/${OWNER}/${REPO}/contents/${path}`;
      const content=btoa(JSON.stringify({tiles:t}));
      let sha;const check=await fetch(url,{headers:GH_H});
      if(check.ok){const j=await check.json();sha=j.sha;}
      const body={message:`update session ${code}`,content};if(sha)body.sha=sha;
      const res=await fetch(url,{method:"PUT",headers:GH_H,body:JSON.stringify(body)});
      if(res.status===409||res.status===422)return 'conflict';
      if(!res.ok){const e=await res.json();showError("Save failed: "+(e.message||res.status));return false;}
      return true;
    }

    // ── OpenCV.js — lazy-loaded on first scan ────────────────────────────────
    let cvReady=false,cvLoading=false,cvResolvers=[];
    function loadCV(){
      if(cvReady)return Promise.resolve();
      return new Promise((resolve,reject)=>{
        cvResolvers.push({resolve,reject});
        if(cvLoading)return;
        cvLoading=true;
        const s=document.createElement("script");
        s.src="https://docs.opencv.org/4.x/opencv.js";
        const onReady=()=>{cvReady=true;cvLoading=false;cvResolvers.forEach(r=>r.resolve());cvResolvers=[];};
        s.onload=()=>{
          if(typeof cv==="undefined"){cvLoading=false;const e=new Error("Vision library failed to initialize.");cvResolvers.forEach(r=>r.reject(e));cvResolvers=[];return;}
          if(cv.Mat)onReady();else cv.onRuntimeInitialized=onReady;
        };
        s.onerror=()=>{cvLoading=false;const e=new Error("Vision library failed to load — check your connection.");cvResolvers.forEach(r=>r.reject(e));cvResolvers=[];};
        document.head.appendChild(s);
      });
    }

    // ── OpenCV multi-tile detection ──────────────────────────────────────────
    // Isolate bright tiles with Otsu + morphology (touching tiles stay apart,
    // each tile becomes one solid blob), accept blobs via minAreaRect (tolerant
    // of rounded corners and rotation), then warp each tile and count pips.
    function scanWithCV(){
      let src=null,gray=null,blurred=null,thresh=null;
      let kernel=null,morphed=null,contours=null,hier=null;
      const results=[];
      try{
        src=cv.imread(canvas);
        gray=new cv.Mat();
        cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
        blurred=new cv.Mat();
        cv.GaussianBlur(gray,blurred,new cv.Size(5,5),0);
        thresh=new cv.Mat();
        cv.threshold(blurred,thresh,0,255,cv.THRESH_BINARY|cv.THRESH_OTSU);
        kernel=cv.getStructuringElement(cv.MORPH_ELLIPSE,new cv.Size(7,7));
        morphed=new cv.Mat();
        cv.morphologyEx(thresh,morphed,cv.MORPH_OPEN,kernel);
        cv.morphologyEx(morphed,morphed,cv.MORPH_CLOSE,kernel);
        contours=new cv.MatVector();
        hier=new cv.Mat();
        cv.findContours(morphed,contours,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

        const frameArea=canvas.width*canvas.height;
        const minArea=frameArea*0.02,maxArea=frameArea*0.60;
        const edgeMargin=Math.min(canvas.width,canvas.height)*0.03;

        const found=[];
        for(let i=0;i<contours.size();i++){
          const c=contours.get(i);
          const area=cv.contourArea(c);
          if(area>=minArea&&area<=maxArea){
            const rect=cv.minAreaRect(c);
            const rw=rect.size.width,rh=rect.size.height;
            const rectArea=rw*rh;
            const ratio=Math.max(rw,rh)/Math.min(rw,rh);
            const fill=rectArea>0?area/rectArea:0;
            if(ratio>=1.4&&ratio<=3.2&&fill>=0.80){
              const pts=cv.RotatedRect.points(rect);
              const atEdge=pts.some(p=>p.x<edgeMargin||p.x>canvas.width-edgeMargin||p.y<edgeMargin||p.y>canvas.height-edgeMargin);
              if(!atEdge){
                const cx=(pts[0].x+pts[1].x+pts[2].x+pts[3].x)/4;
                const cy=(pts[0].y+pts[1].y+pts[2].y+pts[3].y)/4;
                found.push({pts,cx,cy});
              }
            }
          }
          c.delete();
        }

        found.sort((a,b)=>Math.abs(a.cy-b.cy)>60?a.cy-b.cy:a.cx-b.cx);

        for(const tile of found){
          let warped=null,halfA=null,halfB=null;
          try{
            warped=perspectiveWarp(src,tile.pts);
            const landscape=warped.cols>=warped.rows;
            const mid=landscape?Math.floor(warped.cols/2):Math.floor(warped.rows/2);
            if(landscape){
              halfA=warped.roi(new cv.Rect(0,0,mid,warped.rows));
              halfB=warped.roi(new cv.Rect(mid,0,warped.cols-mid,warped.rows));
            }else{
              halfA=warped.roi(new cv.Rect(0,0,warped.cols,mid));
              halfB=warped.roi(new cv.Rect(0,mid,warped.cols,warped.rows-mid));
            }
            results.push({left:countPips(halfA),right:countPips(halfB)});
          }finally{
            if(halfA)halfA.delete();
            if(halfB)halfB.delete();
            if(warped)warped.delete();
          }
        }
      }finally{
        if(src)src.delete();
        if(gray)gray.delete();
        if(blurred)blurred.delete();
        if(thresh)thresh.delete();
        if(kernel)kernel.delete();
        if(morphed)morphed.delete();
        if(contours)contours.delete();
        if(hier)hier.delete();
      }
      return results;
    }

    function perspectiveWarp(grayMat,pts){
      const sorted=[...pts].sort((a,b)=>a.y-b.y);
      const [tl,tr]=sorted.slice(0,2).sort((a,b)=>a.x-b.x);
      const [bl,br]=sorted.slice(2).sort((a,b)=>a.x-b.x);
      const edgeDist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
      const w=Math.max(edgeDist(tl,tr),edgeDist(bl,br));
      const h=Math.max(edgeDist(tl,bl),edgeDist(tr,br));
      const scale=400/Math.max(w,h);
      const dstW=Math.max(Math.round(w*scale),40);
      const dstH=Math.max(Math.round(h*scale),40);
      const srcPts=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
      const dstPts=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,dstW,0,dstW,dstH,0,dstH]);
      const M=cv.getPerspectiveTransform(srcPts,dstPts);
      const warped=new cv.Mat();
      cv.warpPerspective(grayMat,warped,M,new cv.Size(dstW,dstH));
      srcPts.delete();dstPts.delete();M.delete();
      return warped;
    }

    function countPips(halfMat){
      // halfMat is warped from the preprocessed frame: bright tile, dark pips.
      const pad=Math.max(2,Math.floor(Math.min(halfMat.rows,halfMat.cols)*0.05));
      const rw=halfMat.cols-2*pad,rh=halfMat.rows-2*pad;
      if(rw<10||rh<10)return 0;
      const inner=halfMat.roi(new cv.Rect(pad,pad,rw,rh));
      let gray=null,thresh=null,kernel=null,closed=null,conts=null,hierP=null;
      try{
        gray=new cv.Mat();
        cv.cvtColor(inner,gray,cv.COLOR_RGBA2GRAY);
        thresh=new cv.Mat();
        cv.adaptiveThreshold(gray,thresh,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY_INV,11,3);
        kernel=cv.getStructuringElement(cv.MORPH_ELLIPSE,new cv.Size(3,3));
        closed=new cv.Mat();
        cv.morphologyEx(thresh,closed,cv.MORPH_CLOSE,kernel);
        conts=new cv.MatVector();
        hierP=new cv.Mat();
        cv.findContours(closed,conts,hierP,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);
        const regionArea=rw*rh,minPip=regionArea*0.004,maxPip=regionArea*0.12;
        let count=0;
        for(let i=0;i<conts.size();i++){
          const c=conts.get(i);
          const area=cv.contourArea(c);
          const peri=cv.arcLength(c,true);
          c.delete();
          const circ=peri>0?(4*Math.PI*area)/(peri*peri):0;
          if(area>=minPip&&area<=maxPip&&circ>=0.55)count++;
        }
        return Math.min(count,12);
      }finally{
        inner.delete();
        if(gray)gray.delete();
        if(thresh)thresh.delete();
        if(kernel)kernel.delete();
        if(closed)closed.delete();
        if(conts)conts.delete();
        if(hierP)hierP.delete();
      }
    }

    // LOCKED — see CLAUDE.md before modifying
    function preprocess(canvas){
      const ctx=canvas.getContext("2d");
      const d=ctx.getImageData(0,0,canvas.width,canvas.height),px=d.data;
      let mn=255,mx=0;
      for(let i=0;i<px.length;i+=4){
        const g=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];
        px[i]=px[i+1]=px[i+2]=g;
        if(g<mn)mn=g;if(g>mx)mx=g;
      }
      const rng=mx-mn||1;
      for(let i=0;i<px.length;i+=4){
        const v=Math.round(((px[i]-mn)/rng)*255);
        px[i]=px[i+1]=px[i+2]=v;
      }
      ctx.putImageData(d,0,0);
    }

    scanBtn.addEventListener("click",async()=>{
      if(!gameCode){showError("Start or join a game first.");return;}
      if(!playerName){playerName=getName();if(!playerName)return;}
      if(!video.videoWidth){showError("Camera not ready.");return;}
      hideMsg();reviewPanel.classList.remove("visible");
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      canvas.getContext("2d").drawImage(video,0,0);
      preprocess(canvas);
      const dataUrl=canvas.toDataURL("image/jpeg",0.92);
      preview.src=dataUrl;preview.style.display="block";video.style.display="none";
      scanBtn.style.display="none";retakeBtn.style.display="block";
      spinner.style.display="block";scanBtn.disabled=true;
      try{
        showInfo("Detecting tiles…");
        await loadCV();
        const result=scanWithCV();
        if(!result||!result.length)throw new Error("No tiles found. Make sure tiles are fully in frame and well-lit.");
        pendingTiles=result;
        renderReview();reviewPanel.classList.add("visible");
        hideMsg();
      }catch(err){showError(err.message);}
      finally{spinner.style.display="none";scanBtn.disabled=false;}
    });

    retakeBtn.addEventListener("click",()=>{
      preview.style.display="none";video.style.display="block";
      scanBtn.style.display="block";retakeBtn.style.display="none";
      reviewPanel.classList.remove("visible");hideMsg();
    });

    function renderReview(){
      let html="";
      pendingTiles.forEach((t,i)=>{
        const v=isVerified(t.left,t.right);
        html+=`<div class="tile-row">
          <input type="number" min="0" max="12" value="${t.left}" onchange="updatePending(${i},'left',this.value)" />
          <span class="sep">|</span>
          <input type="number" min="0" max="12" value="${t.right}" onchange="updatePending(${i},'right',this.value)" />
          <span class="total">= ${t.left+t.right}</span>
          <span class="${v?'verified':'unverified'}">${v?'✓ catalog':'? check'}</span>
          <button class="del" onclick="removePending(${i})">&#x2715;</button>
        </div>`;
      });
      tileRows.innerHTML=html;
      const sum=pendingTiles.reduce((s,t)=>s+t.left+t.right,0);
      reviewTotal.textContent=`Total: ${sum} dots across ${pendingTiles.length} tile${pendingTiles.length!==1?'s':''}`;
    }

    function clampPip(v){return Math.min(12,Math.max(0,parseInt(v)||0));}
    function updatePending(i,side,val){pendingTiles[i][side]=clampPip(val);renderReview();}
    function validatePending(){return pendingTiles.every(t=>t.left<=12&&t.right<=12&&t.left>=0&&t.right>=0);}
    function removePending(i){pendingTiles.splice(i,1);if(!pendingTiles.length){reviewPanel.classList.remove("visible");return;}renderReview();}

    async function confirmAll(){
      if(!pendingTiles.length)return;
      if(!validatePending()){showError("Each side must be 0–12.");return;}
      showInfo("Saving...");
      const newTiles=pendingTiles.map(t=>({left:t.left,right:t.right,player:playerName,verified:isVerified(t.left,t.right)}));
      for(let attempt=0;attempt<4;attempt++){
        let base=tiles;
        try{const cur=await readSession(gameCode);if(cur)base=cur.tiles||[];}catch(_){}
        const merged=[...base,...newTiles];
        const result=await writeSession(gameCode,merged);
        if(result===true){
          tiles=merged;renderScoreboard();
          showInfo("Saved!");setTimeout(()=>infoEl.style.display="none",1200);
          pendingTiles=[];reviewPanel.classList.remove("visible");
          preview.style.display="none";video.style.display="block";
          scanBtn.style.display="block";retakeBtn.style.display="none";hideMsg();
          return;
        }
        if(result!=='conflict')return;
      }
      showError("Save conflict — tap Scan again to retry.");
    }

    async function deleteSavedTile(myIdx){
      showInfo("Removing...");
      let base=tiles;
      try{const cur=await readSession(gameCode);if(cur)base=cur.tiles||[];}catch(_){}
      let n=0;
      const updated=base.filter(t=>{if(t.player!==playerName)return true;return n++!==myIdx;});
      const result=await writeSession(gameCode,updated);
      if(result==='conflict'){showError("Conflict — tap Refresh and try again.");return;}
      if(!result)return;
      tiles=updated;renderScoreboard();
      showInfo("Removed.");setTimeout(()=>infoEl.style.display="none",1200);
    }

    function showError(m){errorEl.textContent=m;errorEl.style.display="block";infoEl.style.display="none";}
    function showInfo(m){infoEl.textContent=m;infoEl.style.display="block";errorEl.style.display="none";}
    function hideMsg(){errorEl.style.display="none";infoEl.style.display="none";}
  </script>
</body>
</html>
