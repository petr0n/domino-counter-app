name: Deploy Worker

on:
  push:
    branches: [main]
    paths: [worker/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          # Re-apply the Worker secrets on every deploy so a redeploy can never
          # leave the Worker without credentials. Values come from repo secrets.
          secrets: |
            ANTHROPIC_API_KEY
            GITHUB_TOKEN
        env:
          ANTHROPIC_API_KEY: ${{ secrets.PROXY_ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PROXY_GITHUB_TOKEN }}
