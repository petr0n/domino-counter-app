<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engine Test — Claude Counting</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100dvh;background:#0f0f0f;color:#f0f0f0;font-family:system-ui,sans-serif;padding:20px;max-width:900px;margin:0 auto;}
    h1{font-size:1.3rem;margin-bottom:4px;}
    p.sub{color:#888;font-size:0.85rem;margin-bottom:16px;}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
    input[type=file]{color:#aaa;font-size:0.85rem;}
    label{font-size:0.8rem;color:#888;}
    input[type=text]{padding:8px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;font-size:0.9rem;width:180px;}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;}
    .card{background:#1a1a1a;border-radius:12px;padding:12px;display:flex;gap:12px;align-items:flex-start;}
    .card img{width:220px;border-radius:8px;flex:none;background:#111;}
    .res{flex:1;font-size:0.95rem;}
    .res .tiles{font-size:1.1rem;font-weight:700;margin:4px 0;}
    .res .total{color:#22c55e;font-weight:700;}
    .res .meta{color:#666;font-size:0.78rem;margin-top:6px;}
    .res .err{color:#ff6b6b;white-space:pre-wrap;font-size:0.8rem;}
    .pending{color:#f59e0b;}
    details{margin-top:6px;}
    summary{cursor:pointer;color:#555;font-size:0.78rem;}
    pre{white-space:pre-wrap;font-size:0.72rem;color:#777;background:#111;border-radius:6px;padding:8px;margin-top:4px;max-height:160px;overflow:auto;}
  </style>
  <script src="config.js"></script>
</head>
<body>
  <h1>Engine Test — Claude pip counting</h1>
  <p class="sub">Drop your photos in. Each image is sent to the Claude proxy and the detected tiles are shown. This validates counting accuracy before wiring it into the scan flow. Must be opened on <strong>petr0n.github.io</strong> (the proxy only accepts that origin).</p>

  <div class="bar">
    <input type="file" id="files" accept="image/*" multiple />
    <label>model <input type="text" id="model" value="claude-opus-4-8" /></label>
    <label>max&nbsp;px <input type="text" id="maxpx" value="1280" style="width:70px" /></label>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const PROXY = window.PROXY_URL;
    const grid = document.getElementById("grid");

    const PROMPT =
`You are looking at a photo of one or more domino tiles on a surface.
Each domino tile is a rectangle split by a center bar into two square halves.
Each half has 0 to 12 pip dots. Pips may be ANY color (yellow, orange, green,
blue, purple, pink) or black — count every pip regardless of color. A blank
half is 0.

For EVERY domino tile visible:
- find its two halves
- count the pips in each half carefully (0-12 each)

Ignore the background, wood grain, shadows, fingers, and anything that is not a
domino tile.

Reply with ONLY this JSON and nothing else:
{"tiles":[{"left":<0-12>,"right":<0-12>}, ...]}`;

    function downscale(img, maxpx) {
      let { naturalWidth: w, naturalHeight: h } = img;
      const s = Math.min(1, maxpx / Math.max(w, h));
      w = Math.round(w * s); h = Math.round(h * s);
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      return c.toDataURL("image/jpeg", 0.9);
    }

    async function callClaude(dataUrl, model) {
      const base64 = dataUrl.split(",")[1];
      const t0 = performance.now();
      const res = await fetch(`${PROXY}/anthropic`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model,
          max_tokens: 1024,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: PROMPT }
          ]}]
        })
      });
      const ms = Math.round(performance.now() - t0);
      const data = await res.json();
      if (!res.ok) throw new Error(`HTTP ${res.status}\n${JSON.stringify(data).slice(0,400)}`);
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      return { text, ms };
    }

    function parseTiles(text) {
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) return null;
      const tiles = (JSON.parse(m[0]).tiles || []).map(t => ({
        left: Math.min(12, Math.max(0, Number(t.left) || 0)),
        right: Math.min(12, Math.max(0, Number(t.right) || 0))
      }));
      return tiles;
    }

    document.getElementById("files").addEventListener("change", (e) => {
      grid.innerHTML = "";
      const model = document.getElementById("model").value.trim();
      const maxpx = parseInt(document.getElementById("maxpx").value) || 1280;
      [...e.target.files].forEach(file => run(file, model, maxpx));
    });

    function run(file, model, maxpx) {
      const card = document.createElement("div");
      card.className = "card";
      const imgEl = document.createElement("img");
      const res = document.createElement("div");
      res.className = "res";
      res.innerHTML = `<span class="pending">counting…</span>`;
      card.appendChild(imgEl); card.appendChild(res);
      grid.appendChild(card);

      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = async () => {
          const dataUrl = downscale(img, maxpx);
          imgEl.src = dataUrl;
          try {
            const { text, ms } = await callClaude(dataUrl, model);
            const tiles = parseTiles(text);
            if (!tiles) { res.innerHTML = `<div class="err">No JSON in reply:</div><pre>${text}</pre>`; return; }
            const total = tiles.reduce((s, t) => s + t.left + t.right, 0);
            res.innerHTML =
              `<div>${tiles.length} tile${tiles.length !== 1 ? "s" : ""}</div>` +
              `<div class="tiles">${tiles.map(t => `${t.left}|${t.right}`).join("&nbsp;&nbsp;") || "—"}</div>` +
              `<div class="total">sum = ${total}</div>` +
              `<div class="meta">${file.name} · ${ms} ms</div>` +
              `<details><summary>raw</summary><pre>${text.replace(/</g,"&lt;")}</pre></details>`;
          } catch (err) {
            res.innerHTML = `<div class="err">${(err.message||err).replace(/</g,"&lt;")}</div><div class="meta">${file.name}</div>`;
          }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
