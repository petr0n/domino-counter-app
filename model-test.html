<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engine Test — Claude Counting</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100dvh;background:#0f0f0f;color:#f0f0f0;font-family:system-ui,sans-serif;padding:20px;max-width:900px;margin:0 auto;}
    h1{font-size:1.3rem;margin-bottom:4px;}
    p.sub{color:#888;font-size:0.85rem;margin-bottom:16px;}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
    input[type=file]{color:#aaa;font-size:0.85rem;}
    label{font-size:0.8rem;color:#888;}
    input[type=text]{padding:8px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;font-size:0.9rem;width:180px;}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;}
    .card{background:#1a1a1a;border-radius:12px;padding:12px;display:flex;gap:12px;align-items:flex-start;}
    .card img{width:220px;border-radius:8px;flex:none;background:#111;}
    .res{flex:1;font-size:0.95rem;}
    .res .tiles{font-size:1.1rem;font-weight:700;margin:4px 0;}
    .res .total{color:#22c55e;font-weight:700;}
    .res .meta{color:#666;font-size:0.78rem;margin-top:6px;}
    .res .err{color:#ff6b6b;white-space:pre-wrap;font-size:0.8rem;}
    .pending{color:#f59e0b;}
    details{margin-top:6px;}
    summary{cursor:pointer;color:#555;font-size:0.78rem;}
    pre{white-space:pre-wrap;font-size:0.72rem;color:#777;background:#111;border-radius:6px;padding:8px;margin-top:4px;max-height:160px;overflow:auto;}
  </style>
  <script src="config.js"></script>
  <script src="detect.js"></script>
</head>
<body>
  <h1>Engine Test — Claude pip counting</h1>
  <p class="sub">Drop your photos in. Each image is sent to the Claude proxy and the detected tiles are shown. This validates counting accuracy before wiring it into the scan flow. Must be opened on <strong>petr0n.github.io</strong> (the proxy only accepts that origin).</p>

  <div class="bar">
    <input type="file" id="files" accept="image/*" multiple />
    <label>model <input type="text" id="model" value="claude-opus-4-8" /></label>
    <label>max&nbsp;px <input type="text" id="maxpx" value="1568" style="width:70px" /></label>
    <label><input type="checkbox" id="pre" checked /> preprocess (grayscale+contrast)</label>
    <label><input type="checkbox" id="zoom" checked /> zoom (locate tiles, count each)</label>
    <button id="testBtn" style="padding:8px 12px;border-radius:8px;border:none;background:#2a2a2a;color:#fff;cursor:pointer;font-size:0.85rem">Test proxy</button>
  </div>
  <pre id="diag" style="display:none"></pre>

  <div class="grid" id="grid"></div>

  <script>
    const PROXY = window.PROXY_URL;
    const grid = document.getElementById("grid");
    const diag = document.getElementById("diag");

    // Connectivity probe: isolates whether the Worker is reachable, whether CORS
    // works, and whether /anthropic responds — without sending a big image.
    async function testProxy() {
      diag.style.display = "block";
      diag.textContent = `PROXY_URL = ${PROXY}\norigin = ${location.origin}\n\nrunning…`;
      const lines = [`PROXY_URL = ${PROXY}`, `origin = ${location.origin}`, ""];
      // 1) simple GET to base (no preflight) — tests raw reachability + CORS
      try {
        const r = await fetch(PROXY, { method: "GET" });
        lines.push(`[1] GET ${PROXY}  ->  HTTP ${r.status} (reachable, CORS ok)`);
      } catch (e) {
        lines.push(`[1] GET ${PROXY}  ->  ${e.message}  (worker unreachable or no CORS — likely not deployed)`);
      }
      // 2) GitHub route (known-good path) — tests a real proxied call
      try {
        const r = await fetch(`${PROXY}/github/repos/petr0n/domino-counter-app/contents/catalog.json`, { headers: { Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" } });
        lines.push(`[2] GET /github/...catalog.json  ->  HTTP ${r.status}`);
      } catch (e) {
        lines.push(`[2] GET /github/...catalog.json  ->  ${e.message}`);
      }
      // 3) tiny POST to /anthropic (text only) — tests the route + preflight + key
      try {
        const r = await fetch(`${PROXY}/anthropic`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: document.getElementById("model").value.trim(), max_tokens: 16, messages: [{ role: "user", content: "Reply with the word ok." }] })
        });
        const body = await r.text();
        lines.push(`[3] POST /anthropic (tiny)  ->  HTTP ${r.status}\n${body.slice(0, 500)}`);
      } catch (e) {
        lines.push(`[3] POST /anthropic (tiny)  ->  ${e.message}  (route/preflight/key problem)`);
      }
      diag.textContent = lines.join("\n");
    }
    document.getElementById("testBtn").addEventListener("click", testProxy);

    const PROMPT =
`This photo shows one or more domino tiles from a DOUBLE-12 set. Each tile is a
rectangle split by a center bar into two square halves. Each half shows 0 to 12
pips, usually packed into a compact GRID. Do NOT assume a half has 6 or fewer;
many halves have 7 to 12 pips. Pips can be any color and different sets use
different colors — count every pip regardless of its color; never use color to
identify, group, or skip pips. A blank half is 0.

For EACH half of EACH tile, read the grid carefully:
- Count how many COLUMNS of pips and how many ROWS, then give the total.
- Examples: 3 columns x 3 rows = 9; 2 columns x 5 rows = 10; 3 cols x 4 rows = 12.
- Watch the 9-vs-10 trap: 9 is a 3-wide square; 10 is only 2-wide but TALLER
  (5 rows). When a block looks dense, check the column count before deciding —
  do not default to 9.
- Use only the pips inside that half; never include a neighbouring tile's pips.

Reply with ONLY this JSON and nothing else:
{"tiles":[{"left":<0-12>,"right":<0-12>}, ...]}`;

    // Locate every tile (Claude is reliable at this), returning normalized boxes.
    const PROMPT_LOCATE =
`This image contains one or more domino tiles on a surface. Return a tight
bounding box around EACH separate domino tile. Use normalized coordinates from
0 to 1, where (0,0) is the top-left and (1,1) the bottom-right of the image.
Include every tile; ignore anything that is not a domino.

Reply with ONLY this JSON: {"tiles":[{"box":[x0,y0,x1,y1]}, ...]}`;

    // Count one isolated, enlarged tile.
    const PROMPT_ONE =
`This is a close-up of ONE domino tile (it may be rotated). A center bar splits
it into two halves; each half has 0 to 12 pips in a grid. Read the grid by
counting COLUMNS x ROWS: e.g. 3x3 = 9, 2x5 = 10, 3x4 = 12. Watch the 9-vs-10
trap: 9 is a 3-wide square; 10 is 2-wide but 5 rows tall — check the column
count, do not default to 9. Count every pip regardless of color; a blank half
is 0.

Reply with ONLY this JSON: {"left":<0-12>,"right":<0-12>}`;

    function srcSize(s) { return [s.naturalWidth || s.width, s.naturalHeight || s.height]; }

    function toCanvas(source, maxpx, pre) {
      let [w, h] = srcSize(source);
      const s = Math.min(1, maxpx / Math.max(w, h));
      w = Math.round(w * s); h = Math.round(h * s);
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(source, 0, 0, w, h);
      // Color-agnostic: grayscale + contrast stretch makes pips of any color pop.
      if (pre && window.DominoCV) DominoCV.preprocess(c);
      return c;
    }
    function toURL(source, maxpx, pre) { return toCanvas(source, maxpx, pre).toDataURL("image/jpeg", 0.9); }

    // Crop a normalized box [x0,y0,x1,y1] out of a source canvas/image, padded.
    function cropOut(source, box, padFrac) {
      const [W, H] = srcSize(source);
      let [x0, y0, x1, y1] = box.map(Number);
      x0 *= W; x1 *= W; y0 *= H; y1 *= H;
      if (x1 < x0) [x0, x1] = [x1, x0];
      if (y1 < y0) [y0, y1] = [y1, y0];
      const pw = (x1 - x0) * padFrac, ph = (y1 - y0) * padFrac;
      x0 = Math.max(0, Math.floor(x0 - pw)); y0 = Math.max(0, Math.floor(y0 - ph));
      x1 = Math.min(W, Math.ceil(x1 + pw)); y1 = Math.min(H, Math.ceil(y1 + ph));
      const cw = Math.max(1, x1 - x0), ch = Math.max(1, y1 - y0);
      const c = document.createElement("canvas");
      c.width = cw; c.height = ch;
      c.getContext("2d").drawImage(source, x0, y0, cw, ch, 0, 0, cw, ch);
      return c;
    }

    async function callClaude(dataUrl, model, prompt) {
      const base64 = dataUrl.split(",")[1];
      const res = await fetch(`${PROXY}/anthropic`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model, max_tokens: 1024,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: prompt }
          ]}]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(`HTTP ${res.status}\n${JSON.stringify(data).slice(0,400)}`);
      return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    }

    const clamp = v => Math.min(12, Math.max(0, Number(v) || 0));
    function parseJSON(text) { const m = text.match(/\{[\s\S]*\}/); return m ? JSON.parse(m[0]) : null; }
    function parseTilesAll(text) { const j = parseJSON(text); return j ? (j.tiles || []).map(t => ({ left: clamp(t.left), right: clamp(t.right) })) : null; }
    function parseBoxes(text) { const j = parseJSON(text); return j ? (j.tiles || []).map(t => t.box).filter(b => Array.isArray(b) && b.length === 4) : []; }

    document.getElementById("files").addEventListener("change", (e) => {
      grid.innerHTML = "";
      const model = document.getElementById("model").value.trim();
      const maxpx = parseInt(document.getElementById("maxpx").value) || 1280;
      const pre = document.getElementById("pre").checked;
      const zoom = document.getElementById("zoom").checked;
      [...e.target.files].forEach(file => run(file, model, maxpx, pre, zoom));
    });

    function show(res, file, tiles, ms, extra) {
      const total = tiles.reduce((s, t) => s + t.left + t.right, 0);
      res.innerHTML =
        `<div>${tiles.length} tile${tiles.length !== 1 ? "s" : ""}</div>` +
        `<div class="tiles">${tiles.map(t => `${t.left}|${t.right}`).join("&nbsp;&nbsp;") || "—"}</div>` +
        `<div class="total">sum = ${total}</div>` +
        `<div class="meta">${file.name} · ${ms} ms${extra || ""}</div>`;
    }
    function showErr(res, file, err) {
      const m = (err.message || String(err));
      const hint = /failed to fetch|networkerror|load failed/i.test(m)
        ? " — could not reach the proxy. Click “Test proxy” above to diagnose (Worker not deployed, CORS, or key)."
        : "";
      res.innerHTML = `<div class="err">${(m + hint).replace(/</g, "&lt;")}</div><div class="meta">${file.name}</div>`;
    }

    function run(file, model, maxpx, pre, zoom) {
      const card = document.createElement("div");
      card.className = "card";
      const imgEl = document.createElement("img");
      const res = document.createElement("div");
      res.className = "res";
      res.innerHTML = `<span class="pending">${zoom ? "locating tiles…" : "counting…"}</span>`;
      card.appendChild(imgEl); card.appendChild(res);
      grid.appendChild(card);

      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = async () => {
          const t0 = performance.now();
          try {
            if (!zoom) {
              const url = toURL(img, maxpx, pre);
              imgEl.src = url;
              const text = await callClaude(url, model, PROMPT);
              const tiles = parseTilesAll(text);
              if (!tiles) { res.innerHTML = `<div class="err">No JSON:</div><pre>${text.replace(/</g,"&lt;")}</pre>`; return; }
              show(res, file, tiles, Math.round(performance.now() - t0));
              return;
            }
            // ── Two-pass zoom ──
            const work = toCanvas(img, 2000, false);        // color, high-res for cropping
            imgEl.src = toURL(img, 480, pre);                // thumbnail = what we preprocess
            const locText = await callClaude(toURL(work, 1568, pre), model, PROMPT_LOCATE);
            const boxes = parseBoxes(locText);
            if (!boxes.length) {                              // fallback: count whole frame
              const text = await callClaude(toURL(work, maxpx, pre), model, PROMPT);
              const tiles = parseTilesAll(text) || [];
              show(res, file, tiles, Math.round(performance.now() - t0), " · no boxes, whole-frame");
              return;
            }
            res.innerHTML = `<span class="pending">counting ${boxes.length} tile${boxes.length !== 1 ? "s" : ""}…</span>`;
            const tiles = [];
            for (const box of boxes) {
              const crop = cropOut(work, box, 0.12);          // enlarged single tile
              const text = await callClaude(toURL(crop, 900, pre), model, PROMPT_ONE);
              const j = parseJSON(text);
              if (j) tiles.push({ left: clamp(j.left), right: clamp(j.right) });
            }
            show(res, file, tiles, Math.round(performance.now() - t0), ` · zoom ${boxes.length} crops`);
          } catch (err) {
            showErr(res, file, err);
          }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
